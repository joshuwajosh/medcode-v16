version: "3.9"

services:
  # ── Nginx Reverse Proxy ──────────────────────────────────────────
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
      - static_files:/app/api/static:ro
    depends_on:
      medcode:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── MedCode Application ──────────────────────────────────────────
  medcode:
    build: .
    expose:
      - "8000"
    env_file: .env
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql://medcode:${DB_PASSWORD}@postgres:5432/medcode
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - medcode_logs:/app/logs
      - static_files:/app/api/static
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: medcode
      POSTGRES_USER: medcode
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - postgres_logs:/var/log/postgresql
    expose:
      - "5432"
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medcode -d medcode"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    shm_size: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ── Networks ───────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

# ── Volumes ────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local
  medcode_logs:
    driver: local
  nginx_logs:
    driver: local
  static_files:
    driver: local
  postgres_logs:
    driver: local
